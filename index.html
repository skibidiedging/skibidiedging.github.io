<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Skibidi Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #33b0ff;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input {
            padding: 10px;
            margin: 10px 0;
            width: 80%;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        .message {
            margin: 10px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Number Guessing Game</h1>
        <p>Guess a number between 1 and 100:</p>
        <input type="number" id="guess" min="1" max="100">
        <button onclick="checkGuess()">Submit Guess</button>
        <p class="message" id="message"></p>
        <button onclick="resetGame()" style="display: none;" id="resetButton">Play Again</button>
    </div>

    <script>
        let randomNumber;
        let attempts = 0;

        function startGame() {
            randomNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            document.getElementById('message').textContent = '';
            document.getElementById('resetButton').style.display = 'none';
        }

        function checkGuess() {
            const userGuess = Number(document.getElementById('guess').value);
            attempts++;

            if (userGuess < 1 || userGuess > 100 || isNaN(userGuess)) {
                document.getElementById('message').textContent = 'are you a dumbass??? i said 1-100';
                Alert('installing malware...')
                return;
            }

            if (userGuess === randomNumber) {
                document.getElementById('message').textContent = `Congratulations! You guessed the number in ${attempts} attempts!`;
                document.getElementById('resetButton').style.display = 'inline';
            } else if (userGuess < randomNumber) {
                document.getElementById('message').textContent = 'too low';
            } else {
                document.getElementById('message').textContent = 'too high';
            }
        }

        function resetGame() {
            startGame();
            document.getElementById('guess').value = '';
        }

        startGame();
    </script>
</body>
</html>
